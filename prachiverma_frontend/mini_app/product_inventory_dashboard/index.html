<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Inventory Dashboard</title>
    <link rel="stylesheet" href="styles.css" >
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gelasio:ital,wght@0,400..700;1,400..700&family=Kantumruy+Pro:ital,wght@0,100..700;1,100..700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">    
</head>
<body>
    <!--header-->
    <header>
        <div class=".container">
            <h1> Product Inventory Dashboard</h1>
        </div>
    </header>

    <main>
        <div class ="container">
            <!--control section includes : search input, category filter, stock filter and stock filter-->
            <section class="control">
                <!--search bar-->
                <div class="search-bar">
                    <input type="text" id="search" placeholder="Search products here...">
                    <button type="submit">Search</button>
                </div>
                <!--filter options-->
                <div class="filter-categories">
                    <label for="category-filter">Category  </label>
                    <select id="category-filter">
                        <option value="all"> All Categories</option>
                        <!--other option added using javascript function because to avoid data redundancy-->
                    </select>
                </div>

                <!--sorting products-->
                <div class="sort-product">
                    <select id="sort-select">
                        <option value="default">Recommended</option>
                        <option value="price-asc">Price: Low to High</option>
                        <option value="price-desc">Price: High to Low</option>
                        <option value="alpha-asc">Alphabetically: A-Z</option>
                        <option value="alpha-dsc">Alphabetically: Z-A</option>
                    </select>
                </div>

                <!--stock filer-->
                <div class="stock-filter">
                    <label for="out-of stock">Out of Stock</label>
                    <select id="out-of-stock">
                        <option value="all"> All Products</option>
                        <option value="low">Out of stock</option>
                    </select>
                </div>
            </section>
        
            <!--section for inventory analtyics-->
            <section id="analtyics-section">
                <h2> Analytics</h2>
                <div id="total-products">
                    <p>total Products</p>
                    <strong id="total-product">--</strong>
                </div>

                <div id="total-inventory">
                    <p>Total Inventory Value</p>
                    <strong id="inventory-value">--</strong>
                </div>

                <div id="no-out-of-stack">
                    <p>Out of Stock</p>
                    <strong id="stock-value">--</strong>
                </div>
            </section>
            <!--product grid section -->
            <section class="product-section">
                <h2>Products</h2>
                <div id="loading-state"><p>Loading products....</p></div> <!--loading message when product are being fetched-->
                <div id="no-results"><p>No products match with the filters.</p></div>
                <p id="result-count">Showing<span id="count-display">0</p>
                <div id="product-grid"></div>
                <div id="pagination"></div>
                <p id="page-info"></p>
            </section>
        </div>
    </main>
    <!--footer-->
    <footer>
        <div class="container"></div>
    </footer>
</body>
</html>
