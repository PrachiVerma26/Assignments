<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login -Rapid Rental</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">
    <header >
    <div class="container">
        <a href="index.html" class="brand brand-link">
            <img src="assets/icon.png" class="brand-logo" alt="logo">
            <span class="brand-name">Rapid Rental</span>
        </a>
        <div class="header-right">
            <div class="auth">
                <button class="signup-btn" onclick="window.location.href='signup.html'">Sign Up</button>
            </div>
        </div>
    </div>
    </header>

    <main>
        <!--form -->
        <section>
            <div class="login-card">
                <h2>Welcome back</h2>
                <p>Login to your account</p>
                <form id="loginForm">
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit">Sign in</button>
                </form>
                <p>
                    Don't have an account?
                    <a href="signup.html">Create Signup</a>
                </p>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-info">
                    <h3>Rapid Rental</h3>
                    <p class="footer-description">Providing reliable and affordable vehicle rental services.</p>
                </div>
                <div class="footer-contact">
                    <h4 class="contact-title">Contact</h4>
                    <p>Email: support@rapidrental.com</p>
                    <p>India</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2026 Rapid Rental. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script type="module" src="./js/login.js"></script>
</body>
</html>
