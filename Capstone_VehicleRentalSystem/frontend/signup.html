<!DOCTYPE html>
<html lang="en">
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/signup.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="brand">
                <img src="assets/icon.png" class="brand-logo">
                <span class="brand-name">Rapid Rental</span>
            </div>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" placeholder="Search cars, city or type...">
                </div>
                <div class="auth">
                    <button class="login-btn">Login</button>
                </div>
            </div>
        </div>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
    </nav>
    
    <div class="signup-wrapper">
        <main class="signup-container">
            <div class="signup-image">
                <div class="signup-image-text">
                    <h2>
                        Start your <span>membership</span> <br>
                        drive within the hour.
                    </h2>
                </div>
            </div>

            <section class="signup-form">
                <div class="form-card">
                    <h2>Create an account</h2>
                    <p> Get started with RapidRental today</p>

                    <form>
                        <div class="row">
                            <input type="text" placeholder="First Name" required>
                            <input type="text" placeholder="Last Name" required>
                        </div>
                        <input type="text" placeholder="Phone Number">
                        <input type="email" placeholder="Email Address" required>
                        <input type="password" placeholder="Password" required>
                        <button type="submit">Create account</button>
                    </form>
                    <p>
                        Already have an account?
                        <a href="login.html">Login</a>
                    </p>
                </div>
            </section>
        </main>
    </div>

    <footer class="main-footer">
        <div class="container footer">
            <h4>Contact</h4>
            <p>Email: support@rapidrental.com</p>
            <p>India</p>
        </div>
        <div>
            <p>© 2026 Rapid Rental. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
